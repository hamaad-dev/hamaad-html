<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM</title>
</head>
<body style="box-sizing: border-box;"> 
    <center><h1><u><i>SIMPLE FORM</i></u></h1></center>
    <center><table style="border-radius: 20px;" border="2px solid black">
    <tr >
    <td style="border: none;" width="500">
    <center><form style="padding: 10px;" action="" method="get"> 
        <p>Username:<input type="text" name="username" placeholder="User Name" maxlength="15" required>
            <br>
            <br>
           Password:<input type="password" placeholder="password" name="password" maxlength="6" required>
           <br>
           <br>
            &nbsp; &nbsp;Email:<input type="email" placeholder="example@gmail.com" name="email" required>
        </p>
        <br>
           <div style="display: flex; align-items: top; width: 100%; justify-content: center ;"> Comment:<textarea name="Comment" cols="20" rows="4"  placeholder="Enter Your Comment"></textarea></div> 
                 <br> 
        
            <span style="width: 100%; display: flex; justify-content: end; cursor: pointer; "><input style="cursor: pointer;" type="submit" name="Submit"></span>
    </form></center> 
    </td>
    </tr>
    </table></center>
</table>
</body>
</html>
